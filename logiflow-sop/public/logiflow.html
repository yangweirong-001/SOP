<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LogiFlow SOP - 物流标准作业程序智能平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Inter', system-ui, sans-serif; }
  .flow-node { transition: transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s cubic-bezier(.4,0,.2,1), border-color .2s ease; }
  .flow-node:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(15,23,42,.08), 0 8px 10px -6px rgba(15,23,42,.06); }
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(59,130,246,.55);} 70% { box-shadow: 0 0 0 12px rgba(59,130,246,0);} 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0);} }
  .agent-pulse { animation: pulse-ring 2.2s cubic-bezier(.215,.61,.355,1) infinite; }
  @keyframes typing-blink { 0%,80%,100% { opacity:.25; transform: translateY(0);} 40% { opacity:1; transform: translateY(-2px);} }
  .typing-dot { animation: typing-blink 1.2s infinite ease-in-out; display:inline-block; width:6px; height:6px; background:#94a3b8; border-radius:9999px; }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }
  .scrollbar-none::-webkit-scrollbar { display: none; }
  .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
  .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  textarea, input { font-family: inherit; }
  [contenteditable] { outline: none; }
  .agent-panel { transform: translateY(120%); transition: transform .3s cubic-bezier(.4,0,.2,1); }
  .agent-panel.open { transform: translateY(0); }
  .cursor-blink::after { content:'▍'; color:#64748b; animation: blink 1s infinite; margin-left: 2px; }
  @keyframes blink { 0%,50% { opacity: 1;} 51%,100% { opacity: 0;} }
</style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden">

<!-- Header -->
<header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 z-30 relative shadow-sm">
  <div class="flex items-center gap-3">

    <div>
      <h1 class="font-bold text-base text-slate-900 leading-tight">LogiFlow SOP</h1>
      <p class="text-xs text-slate-500 leading-tight">物流标准作业程序智能平台</p>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <div class="hidden md:flex items-center gap-2 bg-slate-100 rounded-full px-3 py-1.5 text-xs">
      <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
      <span class="text-slate-500">当前项目：</span>
      <span class="font-medium text-slate-900 max-w-[180px] truncate" id="currentProject">—</span>
    </div>
    <button onclick="app.exportSOP()" class="px-3 py-1.5 bg-slate-900 text-white rounded-lg text-sm font-medium hover:bg-slate-800 transition flex items-center gap-1.5">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
      导出网页

  </div>
</header>

<div class="flex h-[calc(100vh-64px)]">

        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>

      <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-1">模板市场</div>
      <div class="space-y-2" id="templateList"></div>
    </div>
    <div class="mt-auto p-4 border-t border-slate-200 shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-white text-xs font-bold">AI</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium text-slate-700">SOP 智能助手</div>
          <div class="text-xs text-slate-500" id="agentHint">点击右下角悬浮按钮唤起</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main canvas -->
  <main class="flex-1 flex flex-col bg-slate-50 overflow-hidden min-w-0">
    <div class="h-14 bg-white border-b border-slate-200 flex items-center px-6 justify-between shrink-0">
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <span class="text-xs text-slate-500">流程类型：</span>
          <select id="processType" onchange="app.updateMeta('type', this.value)" class="text-sm border border-slate-300 rounded-lg px-2 py-1 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            <option value="inbound">入库流程</option>
            <option value="outbound">出库流程</option>
            <option value="internal">库内作业</option>
            <option value="transport">运输配送</option>
            <option value="exception">异常处理</option>
          </select>
        </div>
        <div class="h-6 w-px bg-slate-200"></div>
        <button onclick="app.addStep('action')" class="px-3 py-1.5 text-sm border border-slate-300 rounded-lg hover:bg-slate-50 transition flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          添加步骤
        </button>
        <button onclick="app.addStep('decision')" class="px-3 py-1.5 text-sm border border-slate-300 rounded-lg hover:bg-slate-50 transition flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          添加判断
        </button>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="app.deleteCurrentSOP()" class="px-3 py-1.5 text-sm text-red-600 hover:bg-red-50 rounded-lg transition flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          删除 SOP
        </button>
        <button onclick="app.saveSOP()" class="px-4 py-1.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition flex items-center gap-1">

          保存
        </button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-8" id="canvasArea">
      <div class="max-w-3xl mx-auto">
        <!-- SOP meta -->
        <div class="bg-white rounded-xl border border-slate-200 p-6 mb-6 shadow-sm">
          <div class="flex items-start justify-between gap-4 mb-4">
            <div class="flex-1 min-w-0">
              <input id="sopTitle" oninput="app.updateMeta('title', this.value)" class="text-2xl font-bold text-slate-900 w-full border-none focus:ring-0 p-0 bg-transparent" placeholder="输入 SOP 标题…" />
              <textarea id="sopDesc" oninput="app.updateMeta('desc', this.value)" rows="2" class="w-full mt-2 text-sm text-slate-600 border-none focus:ring-0 p-0 resize-none bg-transparent" placeholder="输入 SOP 描述…"></textarea>
            </div>
            <div class="flex flex-col gap-2 items-end shrink-0">
              <span class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-medium" id="sopStatus">已启用</span>
              <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-medium" id="sopVersion">V1.0</span>
            </div>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 pt-4 border-t border-slate-100">
            <div>
              <div class="text-xs text-slate-500 mb-1">负责人</div>
              <input id="sopOwner" oninput="app.updateMeta('owner', this.value)" class="text-sm font-medium text-slate-700 w-full border-none focus:ring-0 p-0 bg-transparent" />
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-1">预计耗时</div>
              <input id="sopDuration" oninput="app.updateMeta('duration', this.value)" class="text-sm font-medium text-slate-700 w-full border-none focus:ring-0 p-0 bg-transparent" />
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-1">适用场景</div>
              <input id="sopScenario" oninput="app.updateMeta('scenario', this.value)" class="text-sm font-medium text-slate-700 w-full border-none focus:ring-0 p-0 bg-transparent" />
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-1">更新日期</div>
              <div class="text-sm font-medium text-slate-700" id="sopUpdatedAt">—</div>
            </div>
          </div>
        </div>
        <!-- Flow -->
        <div id="flowContainer" class="space-y-6 relative pb-10"></div>
        <div class="flex justify-center pt-2">
          <button onclick="app.addStep('action')" class="group flex items-center gap-2 px-6 py-3 bg-white border-2 border-dashed border-slate-300 rounded-xl hover:border-blue-400 hover:bg-blue-50/40 transition">

        </div>

    </div>
    <div class="flex-1 overflow-y-auto p-4" id="propertyContent">
      <div class="text-center text-slate-400 py-12">
        <svg class="w-10 h-10 mx-auto mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <p class="text-sm">点击流程中的步骤<br/>查看和编辑详细信息</p>
      </div>
    </div>
  </aside>
</div>

<!-- AI Agent floating -->
<button id="agentTrigger" onclick="app.toggleAgent(true)" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-br from-blue-600 to-indigo-600 text-white rounded-full shadow-lg shadow-blue-300/40 hover:shadow-xl hover:scale-105 transition flex items-center justify-center z-40 agent-pulse" aria-label="打开 AI 助手">
  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
</button>

<div id="agentWindow" class="agent-panel fixed bottom-6 right-6 w-[380px] max-w-[calc(100vw-2rem)] bg-white rounded-2xl shadow-2xl border border-slate-200 z-40 flex flex-col overflow-hidden" style="height:540px;">
  <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-4 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>

    </div>
    <button onclick="app.toggleAgent(false)" class="text-white/80 hover:text-white transition" aria-label="关闭"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>

  <div class="p-3 bg-white border-t border-slate-200 shrink-0">

    <div class="flex gap-2">
      <input id="agentInput" type="text" placeholder="输入问题或指令…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();app.sendAgentMessage();}" class="flex-1 px-4 py-2 bg-slate-100 border-0 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" />

      </button>
    </div>
  </div>
</div>
