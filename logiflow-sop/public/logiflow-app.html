    /* ============================================================
     *  Storage
     * ============================================================ */
    const STORAGE_KEY = 'logiflow-sop-app-v1';
    const CURRENT_KEY = 'logiflow-sop-app-current';

    function migrate(sops) {
      return sops.map((sop) => ({
        ...sop,
        steps: (sop.steps || []).map((s) => {
          if (s.type === 'action') {
            const risks = s.risks ?? (s.risk ? [s.risk] : []);
            const controls = s.controls ?? (s.control ? [s.control] : []);
            return { ...s, risks, controls, checklist: s.checklist ?? [], notes: s.notes ?? [], substeps: s.substeps ?? [], images: s.images ?? [], imageCaptions: s.imageCaptions ?? [] };
          }
          return { ...s, yesSubsteps: s.yesSubsteps ?? [], noSubsteps: s.noSubsteps ?? [] };
        }),
      }));
    }

    function loadSops() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return migrate(JSON.parse(raw));
      } catch (e) {}
      return migrate(JSON.parse(JSON.stringify(DEFAULT_SOPS)));
    }
    function saveSops(list) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch (e) {} }
    function loadCurrent() { return localStorage.getItem(CURRENT_KEY) || ''; }
    function saveCurrent(id) { try { localStorage.setItem(CURRENT_KEY, id); } catch (e) {} }

    function Button({ className = '', variant = 'default', size = 'md', children, ...rest }) {
      const base = 'inline-flex items-center justify-center gap-1.5 font-medium rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-1 disabled:opacity-50 disabled:pointer-events-none';
      const variants = {
        default: 'bg-blue-600 hover:bg-blue-700 text-white',
        outline: 'border border-slate-300 bg-white hover:bg-slate-50 text-slate-700',
        ghost: 'hover:bg-slate-100 text-slate-700',
        danger: 'bg-red-600 hover:bg-red-700 text-white',
        subtle: 'bg-slate-100 hover:bg-slate-200 text-slate-700',
      };
      const sizes = { sm: 'text-xs px-2 py-1', md: 'text-sm px-3 py-1.5', lg: 'text-base px-4 py-2' };
      return <button className={cn(base, variants[variant], sizes[size], className)} {...rest}>{children}</button>;
    }

    function Input({ className = '', ...rest }) {
      return <input className={cn('w-full px-3 py-1.5 text-sm border border-slate-300 rounded-md focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition', className)} {...rest} />;
    }
    function Textarea({ className = '', ...rest }) {
      return <textarea className={cn('w-full px-3 py-1.5 text-sm border border-slate-300 rounded-md focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition resize-y', className)} {...rest} />;

      Grip: () => <span className="text-slate-400">⋮⋮</span>,
      Branch: () => <span>⑂</span>,
      Save: () => <span>💾</span>,
      Export: () => <span>⤓</span>,
      AI: () => <span>🤖</span>,
      Book: () => <span>📖</span>,
      Image: () => <span>🖼</span>,
      Check: () => <span>✓</span>,

    };

    /* Toast 极简实现 */
    function useToast() {
      const [items, setItems] = useState([]);
      const push = useCallback((msg, tone = 'info') => {
        const id = uid();
        setItems((s) => [...s, { id, msg, tone }]);
        setTimeout(() => setItems((s) => s.filter((x) => x.id !== id)), 2600);
      }, []);
      const view = (
        <div className="fixed top-4 right-4 z-[100] space-y-2">
          {items.map((it) => (
            <div key={it.id} className={cn(
              'px-4 py-2 rounded-md shadow-lg text-sm border animate-in fade-in slide-in-from-top-2',
              it.tone === 'success' && 'bg-emerald-50 border-emerald-200 text-emerald-800',
              it.tone === 'error' && 'bg-red-50 border-red-200 text-red-800',
              it.tone === 'info' && 'bg-slate-800 text-white border-slate-700'
            )}>{it.msg}</div>
          ))}
        </div>
      );
      return { push, view };
    }

    /* ============================================================
     *  SopOutline - 目录
     * ============================================================ */
    function SopOutline({ sop, onJump }) {
      const [collapsed, setCollapsed] = useState(false);
      const groups = useMemo(() => buildGroups(sop.steps), [sop.steps]);
      if (!sop.steps.length) return null;
      return (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm">
          <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
            <div className="flex items-center gap-2 text-sm font-semibold text-slate-700">📖 SOP 目录</div>
            <button className="text-xs text-slate-500 hover:text-slate-800" onClick={() => setCollapsed((v) => !v)}>{collapsed ? '展开' : '收起'}</button>
          </div>
          {!collapsed && (
            <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-1 text-sm">
              {groups.map((g, gi) => (
                <React.Fragment key={g.step.id}>
                  <button className="text-left py-1 text-slate-700 hover:text-blue-700" onClick={() => onJump(g.step.id)}>
                    <span className="inline-block w-6 text-blue-600 font-semibold">{gi + 1}.</span>
                    {g.step.title}
                  </button>
                  {g.children.map((c) => (
                    <button key={c.id} className="text-left py-1 pl-8 text-slate-500 hover:text-amber-700 text-[13px]" onClick={() => onJump(c.id)}>
                      <span className="text-amber-600">◇</span> {c.title}
                    </button>
                  ))}
                </React.Fragment>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* 把 steps 拆成 [{ step: action, children: [decisions...] }] */
    function buildGroups(steps) {
      const groups = [];
      const orphans = [];
      for (const s of steps) {
        if (s.type === 'action') groups.push({ step: s, children: [] });
      }
      for (const s of steps) {
        if (s.type === 'decision') {
          const parent = groups.find((g) => g.step.id === s.parentStepId);
          if (parent) parent.children.push(s);
          else orphans.push(s);
        }
      }
      // 悬空的 decision 单独作为一组，防止丢失
      for (const o of orphans) groups.push({ step: o, children: [] });
      return groups;
    }

    /* ============================================================
     *  StepList - 步骤列表，支持整组拖拽
     * ============================================================ */
    function StepList({ sop, selectedId, onSelect, onChange, toast }) {
      const groups = useMemo(() => buildGroups(sop.steps), [sop.steps]);
      const [dragId, setDragId] = useState(null);
      const [overId, setOverId] = useState(null);

      const addAction = () => {
        const id = uid();
        onChange((s) => ({
          steps: [...s.steps, { id, type: 'action', title: '新操作步骤', content: '', role: '', time: '', tool: '', substeps: [], risks: [], controls: [], checklist: [], notes: [], images: [], imageCaptions: [] }],
        }));
        onSelect(id);
      };
      const addDecision = (parentId) => {
        const id = uid();
        onChange((s) => {
          // 插入到 parent 组的末尾
          const idx = s.steps.findIndex((x) => x.id === parentId);
          if (idx < 0) return {};
          let insertAt = idx + 1;
          while (insertAt < s.steps.length && s.steps[insertAt].type === 'decision' && s.steps[insertAt].parentStepId === parentId) insertAt++;
          const nextSteps = [...s.steps];
          nextSteps.splice(insertAt, 0, { id, type: 'decision', title: '新增判断', content: '', condition: '', role: '', time: '', parentStepId: parentId, yesSubsteps: [], noSubsteps: [] });
          return { steps: nextSteps };
        });
        onSelect(id);
      };
      const deleteStep = (id) => {
        onChange((s) => ({
          steps: s.steps.filter((x) => x.id !== id && x.parentStepId !== id),
        }));
        if (selectedId === id) onSelect(null);
      };

      /* 拖拽：只允许拖动 action 整组（含其挂载的 decision） */
      const onDragStart = (gid) => setDragId(gid);
      const onDragOver = (gid, e) => { e.preventDefault(); setOverId(gid); };
      const onDrop = (targetId) => {
        if (!dragId || dragId === targetId) { setDragId(null); setOverId(null); return; }
        onChange((s) => {
          // 抽出 dragId 组和 targetId 组
          const packed = [];
          for (const st of s.steps) {
            if (st.type === 'action') packed.push([st]);
            else {
              const last = packed[packed.length - 1];
              if (last && last[0].id === st.parentStepId) last.push(st);
              else packed.push([st]);
            }
          }
          const from = packed.findIndex((p) => p[0].id === dragId);
          const to = packed.findIndex((p) => p[0].id === targetId);
          if (from < 0 || to < 0) return {};
          const [moved] = packed.splice(from, 1);
          packed.splice(to, 0, moved);
          return { steps: packed.flat() };
        });
        setDragId(null); setOverId(null);
      };

      return (
        <div className="space-y-3">
          {groups.map((g, gi) => (
            <div
              key={g.step.id}
              draggable
              onDragStart={() => onDragStart(g.step.id)}
              onDragOver={(e) => onDragOver(g.step.id, e)}
              onDrop={() => onDrop(g.step.id)}
              onDragEnd={() => { setDragId(null); setOverId(null); }}
              className={cn('relative transition', dragId === g.step.id && 'drag-ghost', overId === g.step.id && dragId !== g.step.id && 'ring-2 ring-blue-400 rounded-xl')}
            >
              <StepCard step={g.step} index={gi + 1} selected={selectedId === g.step.id} onClick={() => onSelect(g.step.id)} onDelete={() => deleteStep(g.step.id)} onAddDecision={() => addDecision(g.step.id)} isGroupHead={true} />
              {g.children.length > 0 && (
                <div className="ml-8 mt-2 space-y-2 border-l-2 border-amber-200 pl-4 py-1">
                  {g.children.map((c, ci) => (
                    <StepCard key={c.id} step={c} index={`${gi + 1}.${ci + 1}`} selected={selectedId === c.id} onClick={() => onSelect(c.id)} onDelete={() => deleteStep(c.id)} decision />
                  ))}
                </div>
              )}
              {gi < groups.length - 1 && <div className="flow-line-tall" />}
            </div>
          ))}
          <button className="w-full text-sm text-blue-600 hover:text-blue-700 border-2 border-dashed border-blue-300 hover:bg-blue-50 rounded-md py-3 flex items-center justify-center gap-1 transition" onClick={addAction}>
            <Icon.Plus /> 添加操作步骤
          </button>
        </div>
      );
    }

    function StepCard({ step, index, selected, onClick, onDelete, onAddDecision, isGroupHead, decision }) {
      const isDec = decision || step.type === 'decision';
      return (
        <div id={`anchor-${step.id}`}
          onClick={onClick}
          className={cn(
            'step-card group relative rounded-xl border shadow-sm cursor-pointer',
            selected ? 'ring-4 ring-blue-200 border-blue-400' : 'border-slate-200 hover:border-slate-300',
            isDec ? 'bg-amber-50/60 border-amber-200' : 'bg-white',
          )}
        >
          <div className="p-4 flex items-start gap-3">
            {isGroupHead && <div className="cursor-grab active:cursor-grabbing text-slate-300 hover:text-slate-500 mt-1"><Icon.Grip /></div>}
            <div className={cn('w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shrink-0',
              isDec ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'
            )}>{index}</div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap">
                <div className="font-semibold text-slate-800 truncate">{step.title || '未命名'}</div>

          </div>

      );
    }

    /* ============================================================
     *  ImageGallery - 支持粘贴 / 拖拽 / 选择 / caption
     * ============================================================ */
    function ImageGallery({ step, onChange, toast }) {
      const images = step.images || [];
      const captions = step.imageCaptions || [];
      const dropRef = useRef(null);

      const addImage = (dataUrl) => {
        onChange({
          images: [...images, dataUrl],
          imageCaptions: [...captions, ''],
        });
      };
      const removeImage = (i) => {
        onChange({
          images: images.filter((_, j) => j !== i),
          imageCaptions: captions.filter((_, j) => j !== i),
        });
      };
      const updateCaption = (i, v) => {
        const nx = [...captions]; while (nx.length < images.length) nx.push(''); nx[i] = v;
        onChange({ imageCaptions: nx });
      };

      const handleFiles = (files) => {
        Array.from(files || []).forEach((f) => {
          if (!f.type.startsWith('image/')) return;
          const fr = new FileReader();
          fr.onload = () => addImage(fr.result);
          fr.readAsDataURL(f);
        });
      };

      const onPaste = (e) => {
        const items = e.clipboardData?.items || [];
        let handled = false;
        for (const it of items) {
          if (it.kind === 'file') {
            const f = it.getAsFile();
            if (f && f.type.startsWith('image/')) { handleFiles([f]); handled = true; }
          }
        }
        if (!handled && e.clipboardData?.files?.length) {
          handleFiles(e.clipboardData.files); handled = true;
        }
        if (handled) { e.preventDefault(); toast?.('已粘贴图片', 'success'); }
      };

      const onDrop = (e) => {
        e.preventDefault();
        if (e.dataTransfer?.files?.length) handleFiles(e.dataTransfer.files);
      };

      return (
        <div>
          <div className="text-xs font-semibold text-slate-600 mb-2 flex items-center gap-2">
            <Icon.Image /> 示例图片 {images.length > 0 && <span className="text-slate-400 font-normal">({images.length})</span>}
          </div>
          <div
            ref={dropRef}
            tabIndex={0}
            onPaste={onPaste}
            onDragOver={(e) => e.preventDefault()}
            onDrop={onDrop}
            className="border-2 border-dashed border-slate-300 rounded-lg p-3 hover:border-blue-400 focus:border-blue-500 focus:outline-none space-y-3"
          >
            {images.length === 0 && (
              <div className="text-xs text-slate-400 text-center py-4">
                📎 拖拽 / 粘贴（Ctrl+V）图片到此处<br />
                <span className="text-[11px]">或点击下方按钮选择文件</span>
              </div>
            )}
            {images.map((src, i) => (
              <div key={i} className="rounded-lg border border-slate-200 bg-slate-50 overflow-hidden group">
                <div className="relative">
                  <img src={src} alt="" className="w-full max-h-64 object-contain bg-white" />
                  <button className="absolute top-1 right-1 w-6 h-6 rounded-full bg-white/90 shadow text-red-600 opacity-0 group-hover:opacity-100" onClick={() => removeImage(i)}>×</button>
                </div>
                <input
                  className="w-full px-3 py-1.5 text-xs bg-white border-t border-slate-200 outline-none focus:bg-blue-50"
                  placeholder="添加图片说明（可选）"
                  value={captions[i] || ''}
                  onChange={(e) => updateCaption(i, e.target.value)}
                />
              </div>
            ))}
            <div className="flex justify-center">
              <label className="inline-flex items-center gap-1 text-xs text-blue-600 hover:text-blue-700 cursor-pointer">
                <Icon.Plus /> 选择图片
                <input type="file" accept="image/*" multiple hidden onChange={(e) => { handleFiles(e.target.files); e.target.value = ''; }} />
              </label>
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================

    function buildPrintHtml(sop, forPdf = false) {

      const styles = `

        .content { font-size:14px; color:#334155; white-space:pre-wrap; }
        ol.sub-list { padding-left:22px; margin:6px 0; }
        ol.sub-list li { margin:3px 0; font-size:14px; color:#0f172a; }
        ul.list { padding-left:22px; margin:6px 0; }

        .decision-title h3 { font-size:15px; font-weight:700; margin:0; color:#92400e; }
        .condition { background:#fff; border:1px solid #fde68a; border-radius:6px; padding:6px 10px; font-size:13px; margin:6px 0; color:#78350f; }
        .branches { display:flex; gap:12px; margin-top:8px; }
        .branch { flex:1; border-radius:8px; padding:10px 14px; }
        .branch.yes { background:#ecfdf5; border:1px solid #a7f3d0; }
        .branch.no { background:#fef2f2; border:1px solid #fecaca; }
        .branch h4 { margin:0 0 6px; font-size:13px; }

        .branch ol { padding-left:20px; margin:0; font-size:13px; }
        .branch li { margin:2px 0; }

      const chipList = (arr, cls) => arr.length ? `<ul class="list ${cls}">${arr.map((x) => `<li>${escapeHtml(x)}</li>`).join('')}</ul>` : '';
      const subList = (arr) => arr.length ? `<ol class="sub-list">${arr.map((x) => `<li>${escapeHtml(x)}</li>`).join('')}</ol>` : '';
      const imgBlock = (step) => {
        const imgs = step.images || []; const caps = step.imageCaptions || [];
        if (!imgs.length) return '';
        return imgs.map((src, i) => `<div class="img-wrap"><img src="${src}" width="720"/>${caps[i] ? `<div class="img-cap">${escapeHtml(caps[i])}</div>` : ''}</div>`).join('');
      };

      const decisionHtml = (d) => {
        const yes = (d.yesSubsteps || []).map((s, i) => `<li>${escapeHtml(s)}</li>`).join('');
        const no = (d.noSubsteps || []).map((s, i) => `<li>${escapeHtml(s)}</li>`).join('');
        return `
          <div class="decision" id="anc-${d.id}">
            <div class="decision-title"><span class="db">⑂</span><h3>${escapeHtml(d.title)}</h3></div>
            ${d.condition ? `<div class="condition">条件：${escapeHtml(d.condition)}</div>` : ''}
            ${d.content ? `<div class="content">${preWrap(d.content)}</div>` : ''}
            <div class="branches">
              <div class="branch yes"><h4>✅ 是 · 后续步骤</h4><ol>${yes || '<li style="color:#94a3b8">未配置</li>'}</ol></div>

      const groupHtml = (g, idx) => {

        return `
          <div class="group">
            <div class="action" id="anc-${s.id}">
              <div class="action-title"><span class="badge">${idx}</span><h2>${escapeHtml(s.title)}</h2></div>

                ${s.role ? `<span class="chip">👤 ${escapeHtml(s.role)}</span>` : ''}
                ${s.time ? `<span class="chip">⏱ ${escapeHtml(s.time)}</span>` : ''}
                ${s.tool ? `<span class="chip">🛠 ${escapeHtml(s.tool)}</span>` : ''}
              </div>
              ${s.content ? `<div class="content">${preWrap(s.content)}</div>` : ''}
              ${s.substeps?.length ? `<div class="section-label">操作子步骤</div>${subList(s.substeps)}` : ''}
              ${s.checklist?.length ? `<div class="section-label">检查清单</div>${chipList(s.checklist, 'check')}` : ''}
              ${s.risks?.length ? `<div class="section-label">风险点</div>${chipList(s.risks, 'risk')}` : ''}
              ${s.controls?.length ? `<div class="section-label">管控措施</div>${chipList(s.controls, 'control')}` : ''}

      const tocHtml = `
        <div class="toc">

            ${groups.map((g, i) => `
              <li><a href="#anc-${g.step.id}">${escapeHtml(g.step.title)}</a>
                ${g.children.length ? `<ol class="sub">${g.children.map((c) => `<li><a href="#anc-${c.id}">${escapeHtml(c.title)}</a></li>`).join('')}</ol>` : ''}
              </li>
            `).join('')}
          </ol>
        </div>
      `;

      return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>${escapeHtml(sop.title)}</title>
<style>${styles}</style></head><body>
<div class="doc-header">
  <div class="doc-title">${escapeHtml(sop.title)}</div>
  <div class="doc-meta">
    ${sop.category ? `<span>类目：${escapeHtml(sop.category)}</span>` : ''}
    ${sop.owner ? `<span>部门：${escapeHtml(sop.owner)}</span>` : ''}
    ${sop.version ? `<span>版本：${escapeHtml(sop.version)}</span>` : ''}
    ${sop.status ? `<span>状态：${escapeHtml(sop.status)}</span>` : ''}
    ${sop.updatedAt ? `<span>更新：${escapeHtml(sop.updatedAt)}</span>` : ''}
    ${sop.duration ? `<span>时长：${escapeHtml(sop.duration)}</span>` : ''}
  </div>
  ${sop.description ? `<div class="doc-desc">${escapeHtml(sop.description)}</div>` : ''}

${tocHtml}
${groups.map((g, i) => groupHtml(g, i + 1)).join('')}

    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
    }

    async function exportSop(sop, fmt) {
      if (!sop) return;
      const html = buildPrintHtml(sop, fmt === 'pdf');
      const base = (sop.title || 'sop').replace(/[\\/:*?"<>|]/g, '_');
      if (fmt === 'html') {
        downloadBlob(new Blob([html], { type: 'text/html;charset=utf-8' }), `${base}.html`);
        return;
      }
      if (fmt === 'word') {
        const wordHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'></head><body>${html.replace(/^[\s\S]*?<body>/i, '').replace(/<\/body>[\s\S]*$/i, '')}</body></html>`;
        downloadBlob(new Blob([wordHtml], { type: 'application/msword' }), `${base}.doc`);
        return;
      }
      if (fmt === 'pdf') {
        // 用隐藏 iframe 加载完整 HTML，然后 html2canvas → jsPDF
        const iframe = document.createElement('iframe');
        iframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:820px;height:1200px;border:0;';
        iframe.srcdoc = html;
        document.body.appendChild(iframe);
        await new Promise((r) => iframe.addEventListener('load', r, { once: true }));
        // 等待字体和图片
        await new Promise((r) => setTimeout(r, 300));
        try {
          const doc = iframe.contentDocument;
          const target = doc.body;
          const canvas = await window.html2canvas(target, { scale: 2, useCORS: true, backgroundColor: '#ffffff', windowWidth: 820 });
          const imgData = canvas.toDataURL('image/jpeg', 0.92);
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF('p', 'mm', 'a4');
          const pageW = pdf.internal.pageSize.getWidth();
          const pageH = pdf.internal.pageSize.getHeight();
          const imgW = pageW;
          const imgH = (canvas.height * imgW) / canvas.width;
          let heightLeft = imgH;
          let position = 0;
          pdf.addImage(imgData, 'JPEG', 0, position, imgW, imgH);
          heightLeft -= pageH;
          while (heightLeft > 0) {
            position -= pageH;
            pdf.addPage();
            pdf.addImage(imgData, 'JPEG', 0, position, imgW, imgH);
            heightLeft -= pageH;
          }
          pdf.save(`${base}.pdf`);
        } catch (err) {
          console.error(err);
          alert('导出 PDF 失败：' + (err?.message || err));
        } finally {
          iframe.remove();
        }
      }
    }

    /* ============================================================
     *  AiDock - 右下角悬浮 AI 助手
     * ============================================================ */
    const AI_CONFIG_KEY = 'logiflow-ai-cfg-v1';
    const AI_HISTORY_KEY = 'logiflow-ai-history-v1';

    function loadAiConfig() {
      try {
        return JSON.parse(localStorage.getItem(AI_CONFIG_KEY) || 'null') || {
          endpoint: 'https://api.openai.com/v1/chat/completions',
          apiKey: '',
          model: 'gpt-4o-mini',
        };
      } catch (e) {
        return { endpoint: 'https://api.openai.com/v1/chat/completions', apiKey: '', model: 'gpt-4o-mini' };
      }
    }
    function saveAiConfig(cfg) { try { localStorage.setItem(AI_CONFIG_KEY, JSON.stringify(cfg)); } catch (e) {} }
    function loadAiHistory() { try { return JSON.parse(localStorage.getItem(AI_HISTORY_KEY) || '[]') || []; } catch (e) { return []; } }
    function saveAiHistory(list) { try { localStorage.setItem(AI_HISTORY_KEY, JSON.stringify(list.slice(-40))); } catch (e) {} }

    const AI_SYSTEM_PROMPT = `你是一个物流行业的资深 SOP 顾问，擅长梳理仓储、配送、异常处理等流程。请以简洁、结构化、可执行的中文回复用户，输出格式建议使用 Markdown（标题、列表、编号）。当用户提及具体步骤/风险/管控时，请给出可直接落到 SOP 的建议。`;

    const DEMO_ANSWERS = [
      '**建议补充「异常处理分支」**：\n\n- 数量差异 >2% → 立即冻结收货并升级到调度\n- 外包装破损 → 6 面拍照，24h 内出鉴定报告\n- 缺资料 → 挂起并联系采购补齐\n\n可以在当前判断节点的「否」分支里加上这三步。',
      '这个操作步骤的风险点建议补充：\n\n1. **系统单据未及时冲销** → 增加日结抽查\n2. **PDA 掉线导致漏扫** → 增加"复扫复核"作为兜底动作\n3. **多人交叉操作导致责任不清** → 强制单据签名字段',
      '为你梳理这份 SOP 的关键 KPI：\n\n- 入库准确率 ≥ 99.5%\n- 抽检合格率 ≥ 98%\n- 上架超时率 < 3%\n- 异常闭环 SLA 24h\n\n建议在 SOP 表头下方加一个"KPI 目标"块。',
    ];

    function AiDock({ sop, onClose, onInsertBelow, toast }) {
      const [messages, setMessages] = useState(() => loadAiHistory());
      const [input, setInput] = useState('');
      const [busy, setBusy] = useState(false);
      const [cfgOpen, setCfgOpen] = useState(false);
      const [cfg, setCfg] = useState(loadAiConfig);
      const listRef = useRef(null);
      const abortRef = useRef(null);

      useEffect(() => { saveAiHistory(messages); }, [messages]);
      useEffect(() => {
        if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight;
      }, [messages, busy]);

      const contextSummary = useMemo(() => {
        if (!sop) return '';
        const stepBrief = (sop.steps || []).map((s, i) => {
          if (s.type === 'action') return `- 步骤${i + 1}【操作】${s.title}｜${s.role || '-'}｜${s.time || '-'}`;
          return `  · 判断：${s.title}（挂在 ${s.parentStepId}）`;
        }).join('\n');
        return `当前 SOP：${sop.title}\n类目：${sop.category || '-'}\n描述：${sop.description || '-'}\n步骤概览：\n${stepBrief || '(空)'}`;
      }, [sop]);

      const send = async () => {
        const text = input.trim();
        if (!text || busy) return;
        const userMsg = { id: uid(), role: 'user', content: text, at: Date.now() };
        setInput('');
        setMessages((m) => [...m, userMsg]);
        setBusy(true);

        // 无 API Key 时走演示回复
        if (!cfg.apiKey || !cfg.endpoint) {
          const demo = DEMO_ANSWERS[Math.floor(Math.random() * DEMO_ANSWERS.length)];
          const asstId = uid();
          setMessages((m) => [...m, { id: asstId, role: 'assistant', content: '', at: Date.now(), demo: true }]);
          // 逐字打字机
          for (let i = 1; i <= demo.length; i++) {
            await new Promise((r) => setTimeout(r, 8));
            setMessages((m) => m.map((x) => x.id === asstId ? { ...x, content: demo.slice(0, i) } : x));
          }
          setBusy(false);
          return;
        }

        const asstId = uid();
        setMessages((m) => [...m, { id: asstId, role: 'assistant', content: '', at: Date.now() }]);

        const historyForModel = [...messages, userMsg].filter((m) => m.role === 'user' || m.role === 'assistant').slice(-10).map((m) => ({ role: m.role, content: m.content }));

        try {
          abortRef.current = new AbortController();
          const resp = await fetch(cfg.endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${cfg.apiKey}`,
            },
            signal: abortRef.current.signal,
            body: JSON.stringify({
              model: cfg.model,
              stream: true,
              messages: [
                { role: 'system', content: AI_SYSTEM_PROMPT + '\n\n' + contextSummary },
                ...historyForModel,
              ],
            }),
          });
          if (!resp.ok || !resp.body) {
            const errText = await resp.text().catch(() => '');
            throw new Error(`HTTP ${resp.status} ${errText.slice(0, 200)}`);
          }
          const reader = resp.body.getReader();
          const dec = new TextDecoder();
          let buf = '';
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buf += dec.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop() || '';
            for (const line of lines) {
              const s = line.trim();
              if (!s.startsWith('data:')) continue;
              const payload = s.slice(5).trim();
              if (!payload || payload === '[DONE]') continue;
              try {
                const j = JSON.parse(payload);
                const delta = j.choices?.[0]?.delta?.content || j.choices?.[0]?.message?.content || '';
                if (delta) setMessages((m) => m.map((x) => x.id === asstId ? { ...x, content: x.content + delta } : x));
              } catch (e) { /* ignore */ }
            }
          }
        } catch (err) {
          setMessages((m) => m.map((x) => x.id === asstId ? { ...x, content: (x.content || '') + `\n\n**⚠️ 请求失败**：${err?.message || err}\n\n请检查 Endpoint / API Key 是否正确，或在设置里改用兼容 OpenAI 协议的接口。` } : x));
        } finally {
          setBusy(false);
          abortRef.current = null;
        }
      };

      const stop = () => { abortRef.current?.abort(); };
      const clearHistory = () => { if (confirm('清空当前对话历史？')) setMessages([]); };

      return (
        <div className="fixed bottom-6 right-6 w-[400px] h-[560px] bg-white rounded-2xl shadow-2xl border border-slate-200 flex flex-col z-50 overflow-hidden">
          <div className="px-4 py-3 border-b border-slate-200 bg-gradient-to-r from-blue-600 to-indigo-600 text-white flex items-center gap-2">
            <div className="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center">🤖</div>
            <div className="flex-1">
              <div className="font-semibold text-sm">SOP AI 助手</div>
              <div className="text-[11px] text-blue-100">{cfg.apiKey ? `已连接 · ${cfg.model}` : '演示模式（未配置 API Key）'}</div>
            </div>
            <button className="text-white/70 hover:text-white text-sm" title="设置" onClick={() => setCfgOpen(true)}>⚙</button>
            <button className="text-white/70 hover:text-white text-sm" title="清空历史" onClick={clearHistory}>🗑</button>
            <button className="text-white/70 hover:text-white text-lg" onClick={onClose}>×</button>
          </div>
          <div ref={listRef} className="flex-1 overflow-y-auto sop-scroll p-4 space-y-3 bg-slate-50">
            {messages.length === 0 && (
              <div className="text-xs text-slate-500 space-y-2 py-6">
                <div className="text-center text-slate-400">👋 我可以帮你</div>
                <div className="space-y-1">
                  {[
                    '为「' + (sop?.title || '当前 SOP') + '」补充风险与管控措施',
                    '把某个操作步骤拆分成更细的子步骤',
                    '为判断节点生成"是/否"分支的具体动作',
                    '帮我评估这份 SOP 的合规性与可执行性',
                  ].map((q) => (
                    <button key={q} onClick={() => setInput(q)} className="w-full text-left text-xs px-3 py-2 rounded-md bg-white hover:bg-blue-50 border border-slate-200">{q}</button>
                  ))}
                </div>
              </div>
            )}
            {messages.map((m) => (
              <div key={m.id} className={cn('flex gap-2', m.role === 'user' ? 'justify-end' : 'justify-start')}>
                {m.role === 'assistant' && <div className="w-7 h-7 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center shrink-0 text-xs">🤖</div>}
                <div className={cn(
                  'max-w-[80%] px-3 py-2 rounded-lg text-sm whitespace-pre-wrap leading-relaxed',
                  m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-white border border-slate-200 text-slate-800'
                )}>
                  {m.content || <span className="text-slate-400 italic">生成中…</span>}
                </div>
              </div>
            ))}
            {busy && (
              <div className="flex gap-2 items-center text-xs text-slate-500">
                <span className="w-2 h-2 bg-blue-500 rounded-full animate-pulse" />
                <span>AI 正在思考…</span>
                <button className="text-slate-400 hover:text-red-500 text-[11px] underline" onClick={stop}>停止</button>
              </div>
            )}
          </div>
          <div className="p-3 border-t border-slate-200 bg-white">
            <div className="flex items-end gap-2">
              <textarea
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
                rows={2}
                placeholder="Enter 发送，Shift+Enter 换行"
                className="flex-1 px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 resize-none"
              />
              <Button onClick={send} disabled={busy || !input.trim()}>发送</Button>
            </div>
          </div>
          {cfgOpen && (
            <div className="absolute inset-0 bg-slate-900/40 flex items-center justify-center p-4 z-10">
              <div className="w-full bg-white rounded-xl shadow-xl border border-slate-200 p-4 space-y-3">
                <div className="text-sm font-semibold text-slate-800">AI 配置</div>
                <div className="text-[11px] text-slate-500 leading-relaxed">
                  兼容 OpenAI Chat Completions 协议。可配置：<br/>
                  · OpenAI: https://api.openai.com/v1/chat/completions（model: gpt-4o-mini 等）<br/>
                  · 火山方舟（豆包）: https://ark.cn-beijing.volces.com/api/v3/chat/completions（model: 你的接入点 ID）<br/>
                  · Kimi/Moonshot: https://api.moonshot.cn/v1/chat/completions（model: moonshot-v1-8k 等）
                </div>
                <div>
                  <div className="text-xs font-semibold text-slate-600 mb-1">Endpoint</div>
                  <Input value={cfg.endpoint} onChange={(e) => setCfg({ ...cfg, endpoint: e.target.value })} />
                </div>
                <div>
                  <div className="text-xs font-semibold text-slate-600 mb-1">API Key</div>
                  <Input type="password" value={cfg.apiKey} onChange={(e) => setCfg({ ...cfg, apiKey: e.target.value })} placeholder="sk-... 或 ep-..." />
                </div>
                <div>
                  <div className="text-xs font-semibold text-slate-600 mb-1">Model</div>
                  <Input value={cfg.model} onChange={(e) => setCfg({ ...cfg, model: e.target.value })} />
                </div>
                <div className="flex justify-end gap-2 pt-2">
                  <Button variant="outline" onClick={() => setCfgOpen(false)}>取消</Button>
                  <Button onClick={() => { saveAiConfig(cfg); setCfgOpen(false); toast?.('已保存 AI 配置', 'success'); }}>保存</Button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function AiFab({ onClick }) {
      return (
        <button
          onClick={onClick}
          className="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-gradient-to-br from-blue-600 to-indigo-600 text-white shadow-xl hover:shadow-2xl flex items-center justify-center text-2xl z-40 pulse-ring"
          title="打开 AI 助手"
        >🤖</button>
      );
    }

    /* ============================================================
     *  BackupBar - 数据备份/恢复
     * ============================================================ */
    function BackupControls({ sops, onImport, toast }) {
      const doExport = () => {
        const blob = new Blob([JSON.stringify(sops, null, 2)], { type: 'application/json;charset=utf-8' });
        downloadBlob(blob, `logiflow-sops-${nowDate()}.json`);
        toast?.('已导出全部 SOP 数据', 'success');
      };
      const doImport = (e) => {
        const f = e.target.files?.[0]; e.target.value = '';
        if (!f) return;
        const fr = new FileReader();
        fr.onload = () => {
          try {
            const list = JSON.parse(fr.result);
            if (!Array.isArray(list)) throw new Error('文件格式不正确');
            if (!confirm(`将导入 ${list.length} 个 SOP，可能覆盖同名条目，确认继续？`)) return;
            onImport(list);
            toast?.(`已导入 ${list.length} 个 SOP`, 'success');
          } catch (err) {
            toast?.('导入失败：' + (err?.message || err), 'error');
          }
        };
        fr.readAsText(f);
      };
      return (
        <>
          <Button variant="outline" size="sm" onClick={doExport} title="导出全部数据为 JSON（用于备份/迁移）">💾 备份</Button>
          <label className="inline-flex items-center">
            <span className="cursor-pointer text-xs px-2 py-1 border border-slate-300 rounded-md bg-white hover:bg-slate-50 text-slate-700" title="从 JSON 恢复数据">↺ 恢复</span>
            <input type="file" accept="application/json" hidden onChange={doImport} />
          </label>
        </>
      );
    }

    // <<< APPEND_ANCHOR_A >>>

    /* ============================================================
     *  App
     * ============================================================ */
    function App() {
      const [sops, setSops] = useState(loadSops);
      const [currentId, setCurrentId] = useState(() => {
        const c = loadCurrent();
        const list = loadSops();
        return list.find((s) => s.id === c) ? c : (list[0]?.id || '');
      });
      const [selectedStepId, setSelectedStepId] = useState(null);
      const [aiOpen, setAiOpen] = useState(false);
      const [searchQ, setSearchQ] = useState('');
      const [lastSaved, setLastSaved] = useState(Date.now());
      const [savedFlash, setSavedFlash] = useState(false);
      const toast = useToast();

      useEffect(() => {
        saveSops(sops);
        setLastSaved(Date.now());
        setSavedFlash(true);
        const t = setTimeout(() => setSavedFlash(false), 1200);
        return () => clearTimeout(t);
      }, [sops]);
      useEffect(() => { if (currentId) saveCurrent(currentId); }, [currentId]);

      const sop = sops.find((s) => s.id === currentId);
      const selectedStep = sop?.steps.find((x) => x.id === selectedStepId) || null;

      const updateSop = (patch) => setSops((list) => list.map((s) => s.id === currentId ? { ...s, ...(typeof patch === 'function' ? patch(s) : patch) } : s));

      const createSop = () => {
        const id = uid();
        setSops((list) => [...list, {
          id, title: '新建 SOP', description: '', category: '', owner: '', duration: '', scenario: '', version: 'v0.1', status: '草稿', updatedAt: nowDate(), steps: [],
        }]);
        setCurrentId(id);
      };

      const deleteSop = (id) => {
        setSops((list) => {
          const nx = list.filter((s) => s.id !== id);
          if (id === currentId) setCurrentId(nx[0]?.id || '');
          return nx;
        });
      };

      const importAll = (list) => {
        const normalized = migrate(list);
        setSops((prev) => {
          const map = new Map(prev.map((s) => [s.id, s]));
          for (const n of normalized) map.set(n.id, n);
          return Array.from(map.values());
        });
      };

      const filteredSops = useMemo(() => {
        const q = searchQ.trim().toLowerCase();
        if (!q) return sops;
        return sops.filter((s) => {
          const text = [s.title, s.description, s.category, s.owner, ...(s.steps || []).map((x) => x.title + ' ' + (x.content || ''))].join(' ').toLowerCase();
          return text.includes(q);
        });
      }, [sops, searchQ]);

      return (
        <div className="h-screen flex bg-slate-50">
          {toast.view}
          <Sidebar sops={filteredSops} currentId={currentId} onSelect={setCurrentId} onCreate={createSop} onDelete={deleteSop} searchQ={searchQ} onSearch={setSearchQ} />
          <div className="flex-1 flex flex-col overflow-hidden">
            <Header
              sop={sop}
              savedFlash={savedFlash}
              lastSaved={lastSaved}
              extra={<BackupControls sops={sops} onImport={importAll} toast={toast.push} />}
            />
            <div className="flex-1 flex overflow-hidden">
              <div className="flex-1 overflow-y-auto sop-scroll p-6" id="sop-canvas">
                {sop ? (
                  <div className="max-w-4xl mx-auto space-y-4">
                    <SopHeaderEditor sop={sop} onChange={(p) => updateSop(p)} />
                    <SopOutline sop={sop} onJump={(sid) => { setSelectedStepId(sid); document.getElementById(`anchor-${sid}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' }); }} />
                    <StepList sop={sop} selectedId={selectedStepId} onSelect={setSelectedStepId} onChange={updateSop} toast={toast.push} />
                  </div>
                ) : (
                  <div className="text-center text-slate-400 mt-20">没有 SOP，点左侧「新建 SOP」开始 →</div>
                )}
              </div>
              {sop && selectedStep && (
                <StepDetailPanel key={selectedStep.id} sop={sop} step={selectedStep} onChange={updateSop} onClose={() => setSelectedStepId(null)} toast={toast.push} />
              )}
            </div>
          </div>
          {aiOpen
            ? <AiDock sop={sop} onClose={() => setAiOpen(false)} toast={toast.push} />
            : <AiFab onClick={() => setAiOpen(true)} />
          }
        </div>
      );
    }

    /* ============================================================
     *  更多组件将在下文追加（拖拽、步骤卡、详情面板、导出等）
     * ============================================================ */
    // <<< APPEND_ANCHOR_A >>>

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    document.getElementById('boot').classList.add('gone');
    setTimeout(() => document.getElementById('boot').remove(), 400);
  </script>
</body>
</html>
